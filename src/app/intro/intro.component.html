<div class="scene">

  <!-- 1. 하늘 그라디언트 -->
  <div class="sky"
       [style.background]="skyGradient()"
       [style.filter]="weatherSkyFilter()">
  </div>

  <!-- 2. 별 (밤·황혼) -->
  @if (showStars()) {
    <div class="stars">
      @for (s of stars; track $index) {
        <span class="star"
              [class.star--large]="s.large"
              [style.left.%]="s.x"
              [style.top.%]="s.y"
              [style.animation-delay.s]="s.delay">
        </span>
      }
    </div>
  }


  <!-- 3. 구름 레이어 (하늘과 지형 사이) -->
  <div class="clouds-layer">
    <!-- cloud1: 큰 구름 — 3겹 사선 오버랩 -->
    <div class="cloud-strip cloud-strip--1a"></div>
    <div class="cloud-strip cloud-strip--1b"></div>
    <div class="cloud-strip cloud-strip--1c"></div>
  </div>

  <!-- 4b. 지형 (하단 고정, 원본 비율 유지 — 하늘 픽셀 투명 처리) -->
  <div class="landscape">
    <div class="season-tint" [style.background]="seasonTint()"></div>

  </div>

  <!-- 4b. 소 레이어 (z-index: 4 — 지형 위, 꽃 아래) -->
  <div class="cow-adult-wrap">
    <img class="cow-adult" src="/assets/intro-bg/cow/adult-north-west.png" alt="">
  </div>
  <div class="cow-calf-wrap">
    <img class="cow-calf" [src]="calfFrameSrc()" alt="">
  </div>
  <div class="cow-calf-wrap cow-calf-wrap--far">
    <img class="cow-calf cow-calf--far" [src]="calfFrameSrc2()" alt="">
  </div>

  <!-- 5. 노란 풀꽃 정적 베이스 -->
  <div class="flowers-yellow-static"></div>

  <!-- 5. 흰꽃 줄기/잎 레이어 좌측 — 정적 베이스 -->
  <div class="flowers-left"></div>

  <!-- 5. 흰꽃 줄기/잎 레이어 우측 — 정적 베이스 -->
  <div class="flowers-right"></div>

  <!-- 5. 흰 꽃잎/꽃술 + 노란 풀꽃 — 개별 스프라이트 흔들림 -->
  <svg class="plant-sprites"
       viewBox="0 0 400 172"
       preserveAspectRatio="none"
       xmlns="http://www.w3.org/2000/svg">
    @for (sprite of plantSprites; track $index) {
      <g class="plant-sprite"
         [class.plant-sprite--animated]="sprite.animated"
         [attr.data-kind]="sprite.kind"
         [style.--sway]="sprite.sway"
         [style.--lift]="sprite.lift"
         [style.--rotate]="sprite.rotate"
         [style.animation-delay]="sprite.delay"
         [style.animation-duration]="sprite.duration">
        @for (part of sprite.parts; track $index) {
          <path [attr.fill]="part.fill" [attr.d]="part.d"></path>
        }
      </g>
    }
  </svg>

  <!-- 5. 비 -->
  @if (showRain()) {
    <div class="rain">
      @for (d of rainDrops; track $index) {
        <span class="drop"
              [style.left.%]="d.left"
              [style.animation-delay.s]="d.delay"
              [style.animation-duration.s]="d.duration">
        </span>
      }
    </div>
  }

  <!-- 7. 눈 -->
  @if (showSnow()) {
    <div class="snow">
      @for (f of snowFlakes; track $index) {
        <span class="flake"
              [style.left.%]="f.left"
              [style.width.px]="f.size"
              [style.height.px]="f.size"
              [style.animation-delay.s]="f.delay"
              [style.animation-duration.s]="f.duration">
        </span>
      }
    </div>
  }

  <!-- 8. 번개 -->
  @if (showLightning()) {
    <div class="lightning"></div>
  }

  <!-- 9. 시간대 앰비언트 오버레이 (확인용 임시 숨김) -->
  <!-- <div class="ambient" [style.background]="ambientColor()"></div> -->

  <!-- 10. 콘텐츠 (확인용 임시 숨김) -->
  <!-- <div class="content">
    <h1 class="title">S-FOOD</h1>
    <p class="tagline">Better Food, Better World</p>
    <button class="enter-btn" [routerLink]="'/village'">
      Pixel Village 입장하기
    </button>
  </div> -->

</div>
